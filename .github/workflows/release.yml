name: Release

# Publishes all modules to Maven Central via the Sonatype Central Portal
# when a v* tag is pushed. Requires these repository secrets:
#   SONATYPE_USERNAME / SONATYPE_PASSWORD - a Central Portal user token
#   PGP_SECRET_BASE64                     - base64-encoded PGP secret key
#                                           (gpg --export-secret-keys KEY | base64)
#   PGP_PASSPHRASE                        - passphrase for that key

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Test
        run: ./mill --no-server __.test
      - name: Publish to Maven Central
        run: >-
          ./mill --no-server
          mill.scalalib.SonatypeCentralPublishModule/publishAll
          --publishArtifacts __.publishArtifacts
        env:
          MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
